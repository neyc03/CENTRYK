version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: centryx-timescale
    restart: always
    environment:
      POSTGRES_DB: centryx_db
      POSTGRES_USER: centryx_admin
      POSTGRES_PASSWORD: centryx_secure_password_2026
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: centryx-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  timescale_data:
  redis_data:
